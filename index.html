<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅人の杖と救いの泉 Ver 2.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <button id="menu-btn" title="メニュー">☰</button>

    <div id="loading-screen">
        <img src="Loading_Image.webp" id="loading-logo" alt="旅人の杖 ロゴ">
        <p class="warning-text">
            このアプリは探索の補助を目的としたツールです。<br>
            収録されているデータはスポットの適性や正確性を保証するものではありません。<br>
            周囲に注意して、安全を心掛けプレイしましょう。
        </p>
        <div class="loading-status">
            <span class="loading-text">探索の準備中</span>
            <span class="loading-dots">...</span>
        </div>
    </div>

    <div id="map"></div>

    <div id="license-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="license-body">
                <h2>利用規約・ライセンス・出典表示</h2>
                <p>制定日：2026年3月26日</p>
                <hr>
                <p>（利用規約の詳細はapp.jsにて動的に生成、またはここに記述します）</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
